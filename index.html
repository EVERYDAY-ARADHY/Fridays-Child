<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friday's Child — Enter</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    * { cursor: url('cursor8.png') 4 4, auto !important; box-sizing: border-box; }
    a, button, [onclick] { cursor: url('cursor8.png') 4 4, pointer !important; }
    body {
      background: linear-gradient(135deg,#fff0f5 0%,#ffe4e8 50%,#f0d0e0 100%);
      position: relative; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(139,26,74,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(139,26,74,0.06) 1px, transparent 1px);
      background-size: 24px 24px; z-index: 0;
    }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }

    .clay-card {
      background: rgba(255,240,245,0.88);
      backdrop-filter: blur(16px);
      border: 2px dashed rgba(196,69,105,0.35);
      box-shadow:
        inset 2px 2px 8px rgba(255,255,255,0.55),
        0 12px 32px rgba(139,26,74,0.14),
        12px 12px 24px rgba(196,69,105,0.12),
        -12px -12px 24px rgba(255,255,255,0.9);
    }
    .clay-button {
      background: linear-gradient(135deg,#8b1a4a,#c44569);
      color: white;
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      border: 2px solid #6b1d4a; border-radius: 9999px;
      box-shadow: 0 4px 0 0 #4a0e2e, inset 2px 2px 4px rgba(255,255,255,0.2);
      transition: all 0.08s; padding: 12px 28px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .clay-button:hover { filter: brightness(1.1); }
    .clay-button:active { transform: translateY(4px); box-shadow: 0 0 0 0 #4a0e2e; }
    .clay-input {
      background: #fff0f5; border: 2px solid rgba(139,26,74,0.2); border-radius: 12px;
      padding: 12px 16px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px;
      color: #1b1c1a; width: 100%; outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.04); transition: border-color 0.2s;
    }
    .clay-input:focus { border-color: #8b1a4a; }
    .clay-input::placeholder { color: #837375; }
    .field-label {
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      color: #6b1d4a; text-transform: uppercase; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .tab-row { display:flex; background:rgba(196,69,105,0.15); border-radius:14px; padding:4px; gap:4px; border:2px dashed rgba(196,69,105,0.3); }
    .tab-btn {
      flex:1; font-family:'Space Mono',monospace; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.06em;
      padding:9px 6px; border-radius:10px; border:none;
      background:transparent; color:#6b1d4a; transition:all 0.15s;
    }
    .tab-btn.active {
      background: white; color: #8b1a4a;
      box-shadow: 3px 3px 8px rgba(196,69,105,0.18),-3px -3px 8px rgba(255,255,255,0.9);
    }
    .px-star {
      display:inline-block; width:8px; height:8px; background:#c44569;
      box-shadow:8px 0 0 #c44569,-8px 0 0 #c44569,0 8px 0 #c44569,0 -8px 0 #c44569;
      animation: star-pulse 2s ease-in-out infinite;
    }
    @keyframes star-pulse { 0%,100%{transform:scale(1);opacity:0.8;} 50%{transform:scale(1.3);opacity:1;} }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-12px) rotate(5deg);} }
    @keyframes float-r { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(-6deg);} }
    .sticker { position:fixed; pointer-events:none; image-rendering:pixelated; z-index:0; filter:drop-shadow(2px 4px 6px rgba(107,29,74,0.2)); }
    .error-strip {
      background: #ffdad6; border: 2px solid #ba1a1a; border-radius: 10px;
      font-family:'Space Mono',monospace; font-size:11px; color:#93000a;
      text-transform:uppercase; letter-spacing:0.06em;
      padding: 8px 14px; text-align:center;
    }
    #burstCanvas { position:fixed; inset:0; pointer-events:none; z-index:999; }
    .site-name { font-family:'Silkscreen',cursive; font-size:clamp(2rem,8vw,3.2rem); color:#6b1d4a; letter-spacing:0.02em; line-height:1; }
    .site-sub { font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.22em; color:#8b1a4a; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-5 py-8 overflow-hidden relative">
  <canvas id="burstCanvas"></canvas>

  <img src="3.png" class="sticker" style="width:60px;top:8%;left:3%;animation:float 4.5s ease-in-out infinite 0s;"/>
  <img src="6.png" class="sticker" style="width:55px;top:20%;right:5%;animation:float-r 5s ease-in-out infinite 0.6s;"/>
  <img src="7.png" class="sticker" style="width:58px;bottom:20%;left:4%;animation:float 6s ease-in-out infinite 1.2s;"/>
  <img src="2.png" class="sticker" style="width:72px;bottom:15%;right:6%;animation:float-r 4s ease-in-out infinite 0.3s;"/>
  <img src="9.png" class="sticker" style="width:65px;top:60%;left:2%;animation:float 5.5s ease-in-out infinite 2s;"/>

  <div style="position:absolute;top:-10%;left:-10%;width:50vw;height:50vw;border-radius:50%;background:#d4447a;filter:blur(120px);opacity:0.3;z-index:0;pointer-events:none;"></div>
  <div style="position:absolute;bottom:-10%;right:-10%;width:60vw;height:60vw;border-radius:50%;background:#ffd9dd;filter:blur(120px);opacity:0.3;z-index:0;pointer-events:none;"></div>

  <div style="position:absolute;top:15%;left:20%;color:#c44569;z-index:1;animation:float 4s infinite;pointer-events:none;">
    <span class="material-symbols-outlined" style="font-size:28px;font-variation-settings:'FILL' 1;">favorite</span>
  </div>
  <div style="position:absolute;bottom:22%;right:18%;color:#d4447a;z-index:1;animation:float 5s infinite 0.5s;pointer-events:none;">
    <span class="material-symbols-outlined" style="font-size:36px;font-variation-settings:'FILL' 1;">star</span>
  </div>

  <div style="position:relative;z-index:10;width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:10px;">
        <span class="px-star"></span>
        <span class="material-symbols-outlined" style="color:#c44569;font-size:28px;font-variation-settings:'FILL' 1;animation:float 3s ease-in-out infinite;">auto_awesome</span>
        <span class="px-star"></span>
      </div>
      <h1 class="site-name">Friday's Child</h1>
      <p class="site-sub" style="margin-top:8px;">Gallery Entry</p>
    </div>

    <div class="clay-card" style="border-radius:32px;padding:36px 32px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;width:130px;height:130px;background:rgba(255,255,255,0.22);border-radius:50%;filter:blur(18px);pointer-events:none;transform:translate(-40px,-40px);"></div>
      <div style="position:absolute;top:-18px;right:18px;color:#c44569;transform:rotate(12deg);opacity:0.85;pointer-events:none;">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="currentColor"><path d="M12 11C14 8 18 6 20 10C21.5 13 18 16 12 20C6 16 2.5 13 4 10C6 6 10 8 12 11Z" opacity="0.85"/><path d="M12 13C12 13 14 18 17 22C17 22 14 22 12 19C10 22 7 22 7 22C10 18 12 13 12 13Z"/></svg>
      </div>

      <div class="tab-row" style="margin-bottom:24px;">
        <button class="tab-btn active" id="tabGuest" onclick="switchTab('guest')">Visitor</button>
        <button class="tab-btn" id="tabOwner" onclick="switchTab('owner')">Owner</button>
      </div>

      <div id="visitorForm">
        <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#6b1d4a;text-align:center;margin-bottom:20px;">Browse, read &amp; leave sweet notes.</p>
        <div style="margin-bottom:18px;">
          <label class="field-label" for="visitorName">
            <span class="material-symbols-outlined" style="font-size:15px;">person</span> Your Name
          </label>
          <input id="visitorName" type="text" class="clay-input" placeholder="e.g. StarGazer99"/>
        </div>
        <button onclick="enterAsGuest()" class="clay-button" style="width:100%;">
          Enter the Gallery
          <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1;">favorite</span>
        </button>
        <p style="font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#837375;text-align:center;margin-top:14px;">Guests can browse &amp; comment</p>
      </div>

      <div id="ownerForm" style="display:none;">
        <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#6b1d4a;text-align:center;margin-bottom:20px;">Welcome back, Ms. Aditi.</p>
        <div style="margin-bottom:14px;">
          <label class="field-label" for="ownerUsername">
            <span class="material-symbols-outlined" style="font-size:15px;">person</span> Username
          </label>
          <input id="ownerUsername" type="text" class="clay-input" placeholder="username"/>
        </div>
        <div style="margin-bottom:18px;">
          <label class="field-label" for="ownerPass">
            <span class="material-symbols-outlined" style="font-size:15px;">vpn_key</span> Secret Pass
          </label>
          <input id="ownerPass" type="password" class="clay-input" placeholder="password"/>
        </div>
        <div id="ownerError" class="error-strip" style="display:none;margin-bottom:14px;">Wrong credentials — try again</div>
        <button onclick="enterAsOwner()" class="clay-button" style="width:100%;background:linear-gradient(135deg,#6b1d4a,#8b1a4a);box-shadow:0 4px 0 0 #3d0a28;">
          Enter as Ms. Aditi
          <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1;">star</span>
        </button>
        <p style="font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#837375;text-align:center;margin-top:14px;">Ms. Aditi can add, edit &amp; delete</p>
      </div>

      <p style="font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:#d5c2c4;text-align:center;margin-top:20px;">Friday's Child v2 — Cutecore</p>
    </div>
  </div>

  <script>
    const canvas=document.getElementById('burstCanvas'),ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
    const COLORS=['#c44569','#8b1a4a','#d4447a','#ffc0cb','#ffb2bd','#6b1d4a','#ffffff'];
    let particles=[];
    class Pixel{constructor(x,y){const a=Math.random()*Math.PI*2,s=Math.random()*5+1.5;this.x=x;this.y=y;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-Math.random()*2;this.size=Math.random()*6+2;this.color=COLORS[Math.floor(Math.random()*COLORS.length)];this.life=1;this.decay=Math.random()*0.02+0.015;this.gravity=0.12;}update(){this.vy+=this.gravity;this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vx*=0.98;}draw(){ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;ctx.fillRect(Math.round(this.x),Math.round(this.y),this.size,this.size);ctx.restore();}}
    function burst(x,y,n=40){for(let i=0;i<n;i++)particles.push(new Pixel(x,y));}
    function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}
    animate();
    function ambientBurst(){burst(Math.random()*canvas.width,Math.random()*canvas.height*0.7,18);setTimeout(ambientBurst,Math.random()*3000+2000);}
    ambientBurst();
    
    window.switchTab = function(tab){
      const isGuest=tab==='guest';
      document.getElementById('tabGuest').className='tab-btn'+(isGuest?' active':'');
      document.getElementById('tabOwner').className='tab-btn'+(!isGuest?' active':'');
      document.getElementById('visitorForm').style.display=isGuest?'block':'none';
      document.getElementById('ownerForm').style.display=!isGuest?'block':'none';
    }
    window.enterAsGuest = function(){
      const name=document.getElementById('visitorName').value.trim()||'Guest';
      localStorage.setItem('fc_username',name);
      localStorage.setItem('fc_role','guest');
      window.location.href='home.html';
    }
    window.enterAsOwner = function(){
      const user=document.getElementById('ownerUsername').value.trim().toLowerCase();
      const pass=document.getElementById('ownerPass').value.trim();
      if(user==='ms. aditi'&&pass==='Friday\\'schildislovingandgiving9'){
        localStorage.setItem('fc_username','Ms. Aditi');
        localStorage.setItem('fc_role','owner');
        window.location.href='home.html';
      } else {
        const err=document.getElementById('ownerError');
        err.style.display='block';
        setTimeout(()=>err.style.display='none',3000);
      }
    }
    document.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      document.getElementById('ownerForm').style.display!=='none'?window.enterAsOwner():window.enterAsGuest();
    });
  </script>
  <script src="pixel_trail.js"></script>
  <script src="music.js"></script>
</body>
</html>
