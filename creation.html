<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friday's Child — Studio</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    * { cursor:url('cursor8.png') 4 4,auto!important; box-sizing:border-box; }
    *::selection { background: #ffb6c1 !important; color: #3d1a2e !important; }
    *::-moz-selection { background: #ffb6c1 !important; color: #3d1a2e !important; }
    a,button,[onclick] { cursor:url('cursor8.png') 4 4,pointer!important; }
    body { background:linear-gradient(135deg,#fff0f5 0%,#ffe4e8 50%,#f0d0e0 100%);min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;padding-bottom:20px; }
    body::before { content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(to right,rgba(139,26,74,0.06) 1px,transparent 1px),linear-gradient(to bottom,rgba(139,26,74,0.06) 1px,transparent 1px);background-size:24px 24px;z-index:0; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }

    .top-nav { position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:12px 28px;background:rgba(255,228,232,0.7);backdrop-filter:blur(20px);box-shadow:inset 0 2px 4px rgba(255,255,255,0.75),0 6px 16px rgba(139,26,74,0.1);border-bottom:2px solid #c44569; }
    .site-name { font-family:'Silkscreen',cursive;font-size:20px;color:#6b1d4a;text-decoration:none; }
    .nav-link { font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b1d4a;text-decoration:none;padding:7px 13px;border-radius:8px;transition:all 0.15s; }
    .nav-link:hover,.nav-link.active { background:rgba(196,69,105,0.25);color:#8b1a4a; }
    .user-badge { font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:5px 14px;border-radius:20px;background:#fff0f5;box-shadow:3px 3px 8px rgba(196,69,105,0.15),-3px -3px 8px rgba(255,255,255,0.9);color:#8b1a4a; }
    .owner-badge { background:linear-gradient(135deg,#ffe8a0,#ffd060);box-shadow:3px 3px 8px rgba(180,140,0,0.2);color:#5a3e00; }

    .clay-form { background:#fff0f5;box-shadow:12px 12px 24px rgba(196,69,105,0.13),-12px -12px 24px rgba(255,255,255,0.88),inset 2px 2px 4px rgba(255,255,255,0.7);border:2px dashed rgba(196,69,105,0.35);border-radius:24px;padding:36px 32px; }
    
    .clay-input { background:white;border:2px solid rgba(139,26,74,0.2);border-radius:10px;padding:12px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:#1b1c1a;width:100%;outline:none;box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);transition:border-color 0.2s; }
    .clay-input:focus { border-color:#8b1a4a; }
    .clay-input::placeholder { color:#837375; }
    select.clay-input { font-family:'Plus Jakarta Sans',sans-serif; }

    .field-label { font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6b1d4a;display:flex;align-items:center;gap:6px;margin-bottom:6px; }

    .tab-row { display:flex;background:rgba(196,69,105,0.15);border-radius:14px;padding:4px;gap:4px;border:2px dashed rgba(196,69,105,0.3);margin-bottom:24px; }
    .tab-btn { flex:1;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:9px 6px;border-radius:10px;border:none;background:transparent;color:#6b1d4a;transition:all 0.15s; }
    .tab-btn.active { background:white;color:#8b1a4a;box-shadow:3px 3px 8px rgba(196,69,105,0.18),-3px -3px 8px rgba(255,255,255,0.9); }

    .drop-zone { background:white;box-shadow:inset 4px 4px 10px rgba(196,69,105,0.1),inset -4px -4px 10px rgba(255,255,255,0.9);border:2px dashed #c44569;border-radius:16px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;transition:all 0.2s;cursor:pointer; }
    .drop-zone:hover { border-color:#8b1a4a;box-shadow:inset 6px 6px 14px rgba(196,69,105,0.15),inset -5px -5px 12px rgba(255,255,255,0.95); }
    
    .clay-button { background:linear-gradient(135deg,#8b1a4a,#c44569);color:white;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border:2px solid #6b1d4a;border-radius:9999px;box-shadow:0 4px 0 0 #4a0e2e;transition:all 0.08s;padding:12px 28px;display:flex;align-items:center;justify-content:center;gap:8px; }
    .clay-button:active { transform:translateY(4px);box-shadow:0 0 0 0 #4a0e2e; }

                
    .sticker { position:fixed;pointer-events:none;image-rendering:pixelated;z-index:0;filter:drop-shadow(2px 4px 5px rgba(107,29,74,0.18)); }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-12px) rotate(5deg);} }
    @keyframes float-r { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(-5deg);} }
    #burstCanvas { position:fixed;inset:0;pointer-events:none;z-index:999; }
  </style>
  <script>
    if(localStorage.getItem('fc_role') !== 'owner') {
      window.location.replace('gallery.html');
    }
  </script>
</head>
<body>
  <canvas id="burstCanvas"></canvas>
  <img src="1.png" class="sticker" style="width:75px;top:8%;left:2%;animation:float 4.5s ease-in-out infinite;"/>
  <img src="5.png" class="sticker" style="width:62px;top:28%;right:2%;animation:float-r 5.5s ease-in-out infinite 0.8s;"/>
  <img src="6.png" class="sticker" style="width:52px;bottom:20%;left:1.5%;animation:float 6s ease-in-out infinite 1.4s;"/>
  <img src="4.png" class="sticker" style="width:68px;bottom:16%;right:3%;animation:float-r 4.5s ease-in-out infinite 0.4s;"/>

  <div class="sticker" style="top:35%;left:5%;animation:float 7s ease-in-out infinite 0.2s;font-family:'Silkscreen',cursive;color:#c44569;font-size:20px;opacity:0.4;transform:rotate(-15deg);font-weight:bold;">#MUNCHID4LIFE</div>
  <div class="sticker" style="top:70%;right:8%;animation:float-r 6.5s ease-in-out infinite 1.1s;font-family:'Silkscreen',cursive;color:#c44569;font-size:18px;opacity:0.4;transform:rotate(10deg);font-weight:bold;">#TXT</div>
  <img src="scar.png" class="sticker" style="width:70px;top:75%;left:25%;animation:float-r 6s ease-in-out infinite 1.2s;"/>

  <img src="alien.png" class="sticker" style="width:65px;top:50%;left:15%;animation:float 5.5s ease-in-out infinite 0.4s;"/>

  <div class="sticker" style="top:40%;right:25%;animation:float 7.5s ease-in-out infinite 0.9s;font-family:'Silkscreen',cursive;color:#c44569;font-size:22px;opacity:0.3;transform:rotate(-8deg);font-weight:bold;">#NEWJEANS</div>

  <div class="sticker" style="top:15%;right:12%;animation:float 8s ease-in-out infinite 0.7s;font-family:'Silkscreen',cursive;color:#c44569;font-size:16px;opacity:0.3;transform:rotate(15deg);font-weight:bold;">#MUNCHID4LIFE</div>


  <header class="top-nav" id="topNav"></header>

  <main style="max-width:600px;margin:0 auto;padding:32px 20px;position:relative;z-index:1;">
    <div style="text-align:center;margin-bottom:32px;">
      <h1 style="font-family:'Silkscreen',cursive;font-size:clamp(22px,5vw,36px);color:#6b1d4a;">Studio</h1>
      <p style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#8b1a4a;margin-top:8px;">Ms. Aditi's Creative Space</p>
    </div>

    <div class="clay-form">
      <div class="tab-row" style="flex-wrap:wrap;">
        <button class="tab-btn active" id="tabWritten" onclick="switchMainType('Written')">Written Things</button>
        <button class="tab-btn" id="tabVisual" onclick="switchMainType('Visual')">Visual Media</button>
      </div>

      <div style="margin-bottom:20px;">
        <label class="field-label">Category</label>
        <select id="typeWritten" class="clay-input" onchange="updateFormLabels()">
          <option value="Poem">Poem</option>
          <option value="Story">Story</option>
          <option value="Essay">Essay</option>
        </select>
        <select id="typeVisual" class="clay-input" style="display:none;" onchange="updateFormLabels()">
          <option value="Art">Art</option>
          <option value="Picture">Picture</option>
          <option value="Video">Video</option>
        </select>
      </div>

      <div style="margin-bottom:20px;">
        <label class="field-label">Title</label>
        <input type="text" id="entryTitle" class="clay-input" placeholder="Give it a name..."/>
      </div>

      <div id="keywordZone" style="margin-bottom:20px;">
        <label class="field-label">Keyword (For Hover Reveal)</label>
        <input type="text" id="entryKeyword" class="clay-input" placeholder="e.g. MAGIC, MEMORY, LOVE..."/>
      </div>

      <div id="artUploadZone" style="margin-bottom:20px;">
        <label class="field-label" id="artLabel">Banner Image (Optional)</label>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
          <span class="material-symbols-outlined" style="font-size:32px;color:#c44569;font-variation-settings:'FILL' 1;">add_photo_alternate</span>
          <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#6b1d4a;">Tap to select media</span>
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:#837375;text-transform:uppercase;">JPG, PNG, GIF, MP4</span>
        </div>
        <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*"/>
        <div id="previewArea" style="display:none;margin-top:12px;position:relative;border:2px dashed rgba(196,69,105,0.5);border-radius:12px;overflow:hidden;height:120px;background:#e090b8;display:none;align-items:center;justify-content:center;">
          <img id="imagePreview" style="width:100%;height:100%;object-fit:cover;display:none;"/>
          <video id="videoPreview" style="width:100%;height:100%;object-fit:cover;display:none;" autoplay loop muted playsinline></video>
          <button onclick="clearImage(event)" style="position:absolute;top:6px;right:6px;background:rgba(255,255,255,0.9);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#ba1a1a;box-shadow:2px 2px 6px rgba(0,0,0,0.15);z-index:10;">
            <span class="material-symbols-outlined" style="font-size:16px;">close</span>
          </button>
        </div>
      </div>

      <div style="margin-bottom:28px;">
        <label class="field-label" id="descLabel">Poem Content</label>
        <textarea id="entryDesc" class="clay-input" rows="5" placeholder="Write your poem here..."></textarea>
      </div>

      <button onclick="publish()" class="clay-button" style="width:100%;">
        <span class="material-symbols-outlined" style="font-size:20px;">publish</span>
        Publish
      </button>
    </div>
  </main>

  
  <script>
    // ── Pixel Burst ─────────────────────────────────────
    const canvas=document.getElementById('burstCanvas'),ctx=canvas.getContext('2d');
    function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
    resizeCanvas();window.addEventListener('resize',resizeCanvas);
    const COLORS=['#c44569','#8b1a4a','#d4447a','#ffc0cb','#ffb2bd','#6b1d4a','#ffffff'];
    let particles=[];
    class Pixel{constructor(x,y){const a=Math.random()*Math.PI*2,s=Math.random()*5+1.5;this.x=x;this.y=y;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-Math.random()*2;this.sz=Math.random()*6+2;this.c=COLORS[Math.floor(Math.random()*COLORS.length)];this.l=1;this.d=Math.random()*0.02+0.012;this.g=0.11;}update(){this.vy+=this.g;this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.l-=this.d;}draw(){ctx.save();ctx.globalAlpha=Math.max(0,this.l);ctx.fillStyle=this.c;ctx.fillRect(Math.round(this.x),Math.round(this.y),this.sz,this.sz);ctx.restore();}}
    function burst(x,y,n=35){for(let i=0;i<n;i++)particles.push(new Pixel(x,y));}
    function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.l>0);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}
    animate();
    
    // ── Auth & Nav ──────────────────────────────────────
    const username=localStorage.getItem('fc_username')||'Guest';
    const role=localStorage.getItem('fc_role')||'guest';
    const isOwner=role==='owner';

    function buildNav(activePage){
      const badge=isOwner?`<span class="user-badge owner-badge">${username}</span>`:`<span class="user-badge">@${username}</span>`;
      let links=`<a href="home.html" class="nav-link${activePage==='dashboard'?' active':''}">Dashboard</a>`;
      links+=`<a href="gallery.html" class="nav-link${activePage==='gallery'?' active':''}">Gallery</a>`;
      if(isOwner) links+=`<a href="creation.html" class="nav-link${activePage==='studio'?' active':''}">Studio</a>`;
      links+=`<a href="about.html" class="nav-link${activePage==='about'?' active':''}">About</a>`;
      document.getElementById('topNav').innerHTML=`<a href="home.html" class="site-name">Friday's Child</a><nav style="display:flex;gap:4px;align-items:center;">${links}</nav><div style="display:flex;align-items:center;gap:12px;">${badge}</div>`;
          }
    buildNav('studio');

    let currentMainType='Written';
    let currentImage='';
    let isVideo=false;

    function switchMainType(mainType){
      currentMainType=mainType;
      document.getElementById('tabWritten').className='tab-btn'+(mainType==='Written'?' active':'');
      document.getElementById('tabVisual').className='tab-btn'+(mainType==='Visual'?' active':'');
      
      const isVisual = mainType==='Visual';
      document.getElementById('typeWritten').style.display = isVisual ? 'none' : 'block';
      document.getElementById('typeVisual').style.display = isVisual ? 'block' : 'none';
      
      document.getElementById('artLabel').textContent = isVisual ? 'Media (Image/Video) *Required*' : 'Banner Image (Optional)';
      
      updateFormLabels();
    }
    
    function updateFormLabels() {
      const type = currentMainType === 'Written' ? document.getElementById('typeWritten').value : document.getElementById('typeVisual').value;
      let label = 'Poem Content';
      let ph = 'Write your poem here...';
      if(type==='Story') { label = 'Story Content'; ph = 'Write your story here...'; }
      if(type==='Essay') { label = 'Essay Content'; ph = 'Write your essay here...'; }
      if(['Art', 'Picture', 'Video'].includes(type)) { label = 'Description'; ph = 'Tell us about this piece...'; }
      
      document.getElementById('descLabel').textContent = label;
      document.getElementById('entryDesc').placeholder = ph;
    }

    document.getElementById('fileInput').addEventListener('change',function(e){
      const file=e.target.files[0];
      if(!file)return;
      
      isVideo = file.type.startsWith('video/');
      
      const reader=new FileReader();
      reader.onload=function(event){
        currentImage=event.target.result;
        
        if(isVideo) {
          document.getElementById('videoPreview').src=currentImage;
          document.getElementById('videoPreview').style.display='block';
          document.getElementById('imagePreview').style.display='none';
        } else {
          document.getElementById('imagePreview').src=currentImage;
          document.getElementById('imagePreview').style.display='block';
          document.getElementById('videoPreview').style.display='none';
        }
        
        document.getElementById('previewArea').style.display='flex';
        document.querySelector('.drop-zone').style.display='none';
        burst(window.innerWidth/2,window.innerHeight/2,40);
      };
      reader.readAsDataURL(file);
    });

    function clearImage(e){
      e.stopPropagation();
      currentImage='';
      document.getElementById('fileInput').value='';
      document.getElementById('previewArea').style.display='none';
      document.querySelector('.drop-zone').style.display='flex';
    }

    let isPublishing = false;
    async function publish(){
      if(isPublishing) return;
      
      const title=document.getElementById('entryTitle').value.trim();
      const desc=document.getElementById('entryDesc').value.trim();
      const keyword=document.getElementById('entryKeyword').value.trim();
      const activeType = currentMainType === 'Written' ? document.getElementById('typeWritten').value : document.getElementById('typeVisual').value;
      
      if(!title||!desc)return alert('Title and content are required!');
      const needsMedia = currentMainType === 'Visual';
      if(needsMedia&&!currentImage)return alert('Media is required for Visual items!');
      if(needsMedia&&!keyword)return alert('Keyword is required for the pixel effect!');
      
      isPublishing = true;
      const btn = document.querySelector('button[onclick="publish()"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'Publishing...';
      btn.style.opacity = '0.7';
      btn.style.cursor = 'wait';
      
      const newItem={
        id:'custom_'+Date.now(),
        title,
        type:activeType,
        description:desc,
        keyword: keyword || null,
        image: currentImage || null,
        isVideo: isVideo,
        creator:username,
        likes:0
      };
      
      try {
        const res = await fetch('/api/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newItem)
        });
        if (!res.ok) throw new Error('Failed to save to database');
      } catch (err) {
        console.error(err);
        alert('Could not save to database, but will try saving locally as backup.');
        const customItems=JSON.parse(localStorage.getItem('fc_custom_items')||'[]');
        customItems.unshift(newItem);
        localStorage.setItem('fc_custom_items',JSON.stringify(customItems));
      } finally {
        isPublishing = false;
        if(btn) {
          btn.innerHTML = originalText;
          btn.style.opacity = '1';
          btn.style.cursor = 'pointer';
        }
      }
      
      burst(window.innerWidth/2,window.innerHeight/2,50);
      setTimeout(()=>window.location.href='gallery.html',800);
    }
  </script>
  <script type="module" src="pixel_trail.js"></script>
  <script type="module" src="music.js"></script>
</body>
</html>
