<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friday's Child — Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * { cursor:url('cursor8.png') 4 4,auto!important; box-sizing:border-box; }
    *::selection { background: #ffb6c1 !important; color: #3d1a2e !important; }
    *::-moz-selection { background: #ffb6c1 !important; color: #3d1a2e !important; }
    a,button,[onclick] { cursor:url('cursor8.png') 4 4,pointer!important; }
    body { background:linear-gradient(135deg,#fff0f5 0%,#ffe4e8 50%,#f0d0e0 100%);min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;padding-bottom:20px; }
    body::before { content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(to right,rgba(139,26,74,0.06) 1px,transparent 1px),linear-gradient(to bottom,rgba(139,26,74,0.06) 1px,transparent 1px);background-size:24px 24px;z-index:0; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }

    .top-nav { position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:12px 28px;background:rgba(255,228,232,0.7);backdrop-filter:blur(20px);box-shadow:inset 0 2px 4px rgba(255,255,255,0.75),0 6px 16px rgba(139,26,74,0.1);border-bottom:2px solid #c44569; }
    .site-name { font-family:'Silkscreen',cursive;font-size:20px;color:#6b1d4a;text-decoration:none; }
    .nav-link { font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b1d4a;text-decoration:none;padding:7px 13px;border-radius:8px;transition:all 0.15s; }
    .nav-link:hover,.nav-link.active { background:rgba(196,69,105,0.25);color:#8b1a4a; }
    .user-badge { font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:5px 14px;border-radius:20px;background:#fff0f5;box-shadow:3px 3px 8px rgba(196,69,105,0.15),-3px -3px 8px rgba(255,255,255,0.9);color:#8b1a4a; }
    .owner-badge { background:linear-gradient(135deg,#ffe8a0,#ffd060);box-shadow:3px 3px 8px rgba(180,140,0,0.2);color:#5a3e00; }

    .glass-bar { background:rgba(255,240,245,0.65);backdrop-filter:blur(16px);border:2px dashed #c44569;box-shadow:0 8px 24px rgba(139,26,74,0.08);border-radius:16px;padding:16px 20px; }
    input.search-input { background:white;border:2px solid #c44569;border-radius:9999px;padding:9px 18px 9px 44px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#1b1c1a;width:100%;outline:none;box-shadow:inset 4px 4px 8px rgba(196,69,105,0.08),inset -4px -4px 8px rgba(255,255,255,0.9);transition:border-color 0.2s; }
    input.search-input:focus { border-color:#8b1a4a; box-shadow:0 0 0 1px #8b1a4a; }
    input.search-input::placeholder { color:#837375; }
    .filter-pill { font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:8px 18px;border-radius:9999px;border:2px solid #c44569;background:white;color:#6b1d4a;box-shadow:3px 3px 8px rgba(196,69,105,0.12),-3px -3px 8px rgba(255,255,255,0.9);transition:all 0.1s;white-space:nowrap; }
    .filter-pill:hover { color:#8b1a4a;border-color:#8b1a4a; }
    .filter-pill:active { transform:translateY(2px);box-shadow:inset 2px 2px 6px rgba(196,69,105,0.15); }
    .filter-pill.active { background:linear-gradient(135deg,#8b1a4a,#c44569);color:white;border-color:#6b1d4a;box-shadow:0 4px 0 0 #4a0e2e; }

    .gallery-card { background:#fff0f5;box-shadow:8px 8px 18px rgba(196,69,105,0.13),-8px -8px 18px rgba(255,255,255,0.88),inset 2px 2px 4px rgba(255,255,255,0.7);border:2px dashed rgba(196,69,105,0.35);border-radius:16px;overflow:hidden;transition:all 0.25s;position:relative; }
    .gallery-card:hover { transform:translateY(-4px);box-shadow:14px 14px 28px rgba(196,69,105,0.18),-10px -10px 24px rgba(255,255,255,0.95); }
    .card-img-wrap { height:180px;overflow:hidden;position:relative;background:linear-gradient(135deg,#e090b8,#c44569);border-bottom:2px dashed rgba(196,69,105,0.35); }
    .card-img-wrap img { width:100%;height:100%;object-fit:cover; }
    .card-img-wrap::after { content:'';position:absolute;inset:0;background:linear-gradient(to br,rgba(255,255,255,0.3) 0%,transparent 60%);pointer-events:none; }
    .pixel-badge { font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;box-shadow:2px 2px 0 #c44569;border:2px solid #c44569;border-radius:0;padding:3px 9px;background:white;color:#6b1d4a; }
    .pixel-badge-poem { background:#cfcfe3;color:#444655;border-color:#9b8ed4;box-shadow:2px 2px 0 #9b8ed4; }
    .like-btn { background:rgba(255,255,255,0.9);border:2px solid #c44569;border-radius:0;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:4px 10px;display:flex;align-items:center;gap:5px;box-shadow:2px 2px 0 #8b1a4a;transition:all 0.08s;color:#8b1a4a;text-transform:uppercase; }
    .like-btn:active { transform:translate(2px,2px);box-shadow:0 0 0 #8b1a4a; }
    .owner-overlay { position:absolute;top:10px;left:10px;display:flex;gap:6px;opacity:0;transition:opacity 0.2s;z-index:20; }
    .gallery-card:hover .owner-overlay { opacity:1; }
    .ov-btn { font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:5px 11px;border-radius:0;border:2px solid;backdrop-filter:blur(8px);transition:all 0.1s; }
    .ov-btn.edit { background:rgba(207,207,227,0.92);border-color:#9b8ed4;color:#444655;box-shadow:2px 2px 0 #9b8ed4; }
    .ov-btn.delete { background:rgba(255,218,214,0.92);border-color:#ba1a1a;color:#93000a;box-shadow:2px 2px 0 #ba1a1a; }
    .ov-btn:active { transform:translate(2px,2px);box-shadow:0 0 0; }
    .owner-banner { font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;background:linear-gradient(135deg,#fff8e0,#ffe8a0);border:2px solid #d4a017;box-shadow:4px 4px 0 #d4a017;border-radius:0;padding:10px 18px;color:#5a3e00;text-align:center;margin-bottom:24px; }

    .modal-backdrop { position:fixed;inset:0;background:rgba(60,20,40,0.5);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px; }
    .modal-card { background:#fff0f5;box-shadow:16px 16px 32px rgba(196,69,105,0.2),-16px -16px 32px rgba(255,255,255,0.95);border:2px dashed #c44569;border-radius:20px;padding:36px 32px;width:100%;max-width:460px; }
    .clay-input { background:white;border:2px solid rgba(139,26,74,0.2);border-radius:10px;padding:12px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:#1b1c1a;width:100%;outline:none;box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);transition:border-color 0.2s; }
    .clay-input:focus { border-color:#8b1a4a; }
    .clay-button { background:linear-gradient(135deg,#8b1a4a,#c44569);color:white;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border:2px solid #6b1d4a;border-radius:9999px;box-shadow:0 4px 0 0 #4a0e2e;transition:all 0.08s;padding:12px 28px;display:flex;align-items:center;justify-content:center;gap:8px; }
    .clay-button:active { transform:translateY(4px);box-shadow:0 0 0 0 #4a0e2e; }

    .sticker { position:fixed;pointer-events:none;image-rendering:pixelated;z-index:0;filter:drop-shadow(2px 4px 5px rgba(107,29,74,0.18)); }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-12px) rotate(5deg);} }
    @keyframes float-r { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(-5deg);} }
    #burstCanvas { position:fixed;inset:0;pointer-events:none;z-index:999; }

    /* PixelTransition CSS */
    .pixelated-image-card {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .pixelated-image-card__default,
    .pixelated-image-card__active,
    .pixelated-image-card__pixels {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .pixelated-image-card__active {
      z-index: 2;
      display: none;
      background-color: #1a1014;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .pixelated-image-card__active-text {
      font-family: 'Silkscreen', cursive;
      font-size: 24px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px rgba(255,178,189,0.8);
      z-index: 5;
    }

    .pixelated-image-card__pixels {
      pointer-events: none;
      position: absolute;
      z-index: 3;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-wrap: wrap;
    }

    .pixelated-image-card__pixel {
      display: none;
      background-color: #ffb2bd;
      position: absolute;
    }
  </style>
</head>
<body>
  <canvas id="burstCanvas"></canvas>
  <img src="3.png" class="sticker" style="width:56px;top:9%;left:1.5%;animation:float 4.5s ease-in-out infinite;"/>
  <img src="7.png" class="sticker" style="width:54px;top:30%;right:1.5%;animation:float-r 5.5s ease-in-out infinite 0.8s;"/>
  <img src="6.png" class="sticker" style="width:52px;bottom:22%;left:1%;animation:float 6s ease-in-out infinite 1.4s;"/>
  <img src="9.png" class="sticker" style="width:62px;bottom:18%;right:2%;animation:float-r 4.5s ease-in-out infinite 0.4s;"/>

  <div class="sticker" style="top:35%;left:5%;animation:float 7s ease-in-out infinite 0.2s;font-family:'Silkscreen',cursive;color:#c44569;font-size:20px;opacity:0.4;transform:rotate(-15deg);font-weight:bold;">#MUNCHID4LIFE</div>
  <div class="sticker" style="top:70%;right:8%;animation:float-r 6.5s ease-in-out infinite 1.1s;font-family:'Silkscreen',cursive;color:#c44569;font-size:18px;opacity:0.4;transform:rotate(10deg);font-weight:bold;">#TXT</div>
  <div class="sticker" style="top:15%;right:12%;animation:float 8s ease-in-out infinite 0.7s;font-family:'Silkscreen',cursive;color:#c44569;font-size:16px;opacity:0.3;transform:rotate(15deg);font-weight:bold;">#MUNCHID4LIFE</div>


  <div id="editModal" class="modal-backdrop" style="display:none;">
    <div class="modal-card">
      <h2 style="font-family:'Silkscreen',cursive;font-size:18px;color:#6b1d4a;margin-bottom:20px;">Edit Item</h2>
      <div style="margin-bottom:14px;"><label style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b1d4a;display:block;margin-bottom:6px;">Title</label><input id="editTitle" type="text" class="clay-input"/></div>
      <div style="margin-bottom:14px;"><label style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b1d4a;display:block;margin-bottom:6px;">Description / Poem</label><textarea id="editCaption" class="clay-input" rows="4" style="resize:vertical;"></textarea></div>
      <div style="margin-bottom:20px;"><label style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b1d4a;display:block;margin-bottom:6px;">Type</label><select id="editType" class="clay-input"><option value="Art">Art</option><option value="Poem">Poem</option></select></div>
      <div style="display:flex;gap:12px;">
        <button onclick="saveEdit()" class="clay-button" style="flex:1;">Save</button>
        <button onclick="document.getElementById('editModal').style.display='none'" style="flex:1;background:#fff0f5;color:#8b1a4a;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;border:2px solid #c44569;border-radius:9999px;padding:12px;box-shadow:0 4px 0 0 #c44569;transition:all 0.08s;">Cancel</button>
      </div>
    </div>
  </div>

  <header class="top-nav" id="topNav"></header>

  <main style="max-width:1200px;margin:0 auto;padding:28px 20px;position:relative;z-index:1;">
    <div id="ownerBanner" class="owner-banner" style="display:none;">Ms. Aditi Mode — Hover cards to Edit or Delete</div>
    <div style="text-align:center;margin-bottom:32px;">
      <h1 style="font-family:'Silkscreen',cursive;font-size:clamp(22px,5vw,36px);color:#6b1d4a;">Gallery</h1>
      <p style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#8b1a4a;margin-top:8px;">Poems, Art &amp; Creative Pieces</p>
      <div style="height:3px;background:repeating-linear-gradient(to right,#c44569 0,#c44569 8px,transparent 8px,transparent 16px);margin:14px auto;max-width:260px;"></div>
    </div>
    <section class="glass-bar" style="margin-bottom:28px;max-width:760px;margin-left:auto;margin-right:auto;">
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
        <div style="position:relative;flex:1;min-width:180px;">
          <span class="material-symbols-outlined" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#837375;font-size:18px;pointer-events:none;">search</span>
          <input id="searchInput" type="text" class="search-input" placeholder="Search gallery..."/>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="filterPills">
          <button class="filter-pill active" onclick="setFilter('All', this)">All</button>
          <button class="filter-pill" onclick="setFilter('Poem', this)">Poems</button>
          <button class="filter-pill" onclick="setFilter('Story', this)">Stories</button>
          <button class="filter-pill" onclick="setFilter('Art', this)">Art</button>
          <button class="filter-pill" onclick="setFilter('Picture', this)">Pictures</button>
          <button class="filter-pill" onclick="setFilter('Video', this)">Videos</button>
        </div>
      </div>
    </section>
    <div id="galleryGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div>
  </main>

  <script>
    const canvas=document.getElementById('burstCanvas'),ctx=canvas.getContext('2d');
    function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
    resizeCanvas();window.addEventListener('resize',resizeCanvas);
    const COLORS=['#c44569','#8b1a4a','#d4447a','#ffc0cb','#ffb2bd','#6b1d4a','#ffffff'];
    let particles=[];
    class Pixel{constructor(x,y){const a=Math.random()*Math.PI*2,s=Math.random()*5+1.5;this.x=x;this.y=y;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-Math.random()*2;this.sz=Math.random()*6+2;this.c=COLORS[Math.floor(Math.random()*COLORS.length)];this.l=1;this.d=Math.random()*0.02+0.012;this.g=0.11;}update(){this.vy+=this.g;this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.l-=this.d;}draw(){ctx.save();ctx.globalAlpha=Math.max(0,this.l);ctx.fillStyle=this.c;ctx.fillRect(Math.round(this.x),Math.round(this.y),this.sz,this.sz);ctx.restore();}}
    function burst(x,y,n=35){for(let i=0;i<n;i++)particles.push(new Pixel(x,y));}
    function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.l>0);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}
    animate();
    function ambientBurst(){burst(Math.random()*canvas.width,Math.random()*canvas.height*0.8,15);setTimeout(ambientBurst,Math.random()*4000+2500);}
    ambientBurst();
    
    const username=localStorage.getItem('fc_username')||'Guest';
    const role=localStorage.getItem('fc_role')||'guest';
    const isOwner=role==='owner';

    function buildNav(activePage){
      const badge=isOwner?`<span class="user-badge owner-badge">${username}</span>`:`<span class="user-badge">@${username}</span>`;
      let links=`<a href="home.html" class="nav-link${activePage==='dashboard'?' active':''}">Dashboard</a>`;
      links+=`<a href="gallery.html" class="nav-link${activePage==='gallery'?' active':''}">Gallery</a>`;
      if(isOwner) links+=`<a href="creation.html" class="nav-link${activePage==='studio'?' active':''}">Studio</a>`;
      links+=`<a href="about.html" class="nav-link${activePage==='about'?' active':''}">About</a>`;
      document.getElementById('topNav').innerHTML=`<a href="home.html" class="site-name">Friday's Child</a><nav style="display:flex;gap:4px;align-items:center;">${links}</nav><div style="display:flex;align-items:center;gap:12px;">${badge}</div>`;
    }
    buildNav('gallery');
    if(isOwner)document.getElementById('ownerBanner').style.display='block';

    const DEFAULT_ITEMS=[
      {id:'poem1',title:"Monday's Child",type:'Poem',image:'',description:`Monday's child is fair of face,
Tuesday's child is full of grace,
Wednesday's child is full of woe,
Thursday's child has far to go,
Friday's child is loving and giving,
Saturday's child works hard for a living,
But the child who is born on the Sabbath day
Is bonny and blithe and good and gay.`,creator:'Mother Goose',likes:0}
    ];
    async function getAllItems(){
      const customLocal=JSON.parse(localStorage.getItem('fc_custom_items')||'[]');
      let customDb = [];
      try {
        const res = await fetch('/api/items');
        if (res.ok) customDb = await res.json();
      } catch(e) { console.error('Failed to fetch DB items', e); }
      
      const deleted=JSON.parse(localStorage.getItem('fc_deleted_ids')||'[]');
      const edited=JSON.parse(localStorage.getItem('fc_edited_items')||'{}');
      
      // Combine local and DB items (DB items take precedence if IDs match)
      const dbIds = customDb.map(i => i.id);
      const filteredLocal = customLocal.filter(i => !dbIds.includes(i.id));
      
      return [...DEFAULT_ITEMS,...filteredLocal,...customDb].filter(i=>!deleted.includes(i.id)).map(i=>edited[i.id]?{...i,...edited[i.id]}:i);
    }
    function deleteItemById(id){
      const custom=JSON.parse(localStorage.getItem('fc_custom_items')||'[]');
      if(custom.some(i=>i.id===id)){localStorage.setItem('fc_custom_items',JSON.stringify(custom.filter(i=>i.id!==id)));}
      else{const d=JSON.parse(localStorage.getItem('fc_deleted_ids')||'[]');d.push(id);localStorage.setItem('fc_deleted_ids',JSON.stringify(d));}
    }
    function saveEditById(id,upd){
      const custom=JSON.parse(localStorage.getItem('fc_custom_items')||'[]');
      const ci=custom.findIndex(i=>i.id===id);
      if(ci>=0){Object.assign(custom[ci],upd);localStorage.setItem('fc_custom_items',JSON.stringify(custom));}
      else{const ed=JSON.parse(localStorage.getItem('fc_edited_items')||'{}');ed[id]={...(ed[id]||{}),...upd};localStorage.setItem('fc_edited_items',JSON.stringify(ed));}
    }

    const grid=document.getElementById('galleryGrid');
    let currentFilter='All',searchQuery='';

    function setFilter(f, btn){
      currentFilter=f;
      document.querySelectorAll('#filterPills .filter-pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery();
    }

    async function fetchLikes(id){
      try{const r=await fetch(`/api/likes/${id}`);const d=await r.json();return d.count||0;}catch(e){return 0;}
    }
    async function doLike(btn,id){
      if(localStorage.getItem('liked_'+id)){
        // Already liked
        btn.style.background='rgba(196,69,105,0.3)';
        setTimeout(()=>btn.style.background='rgba(255,255,255,0.9)', 300);
        return;
      }
      try{
        const r=await fetch(`/api/likes/${id}`,{method:'POST'});
        const d=await r.json();
        btn.querySelector('.like-count').textContent=d.count;
        localStorage.setItem('liked_'+id, 'true');
        btn.querySelector('.material-symbols-outlined').style.color = '#c44569';
      }catch(e){
        const s=btn.querySelector('.like-count');
        s.textContent=parseInt(s.textContent||'0')+1;
        localStorage.setItem('liked_'+id, 'true');
      }
      btn.style.background='rgba(196,69,105,0.3)';
      setTimeout(()=>btn.style.background='rgba(255,255,255,0.9)',600);
      burst(btn.getBoundingClientRect().x,btn.getBoundingClientRect().y,30);
    }

    async function renderGallery(){
      const all=await getAllItems();
      const filtered=all.filter(item=>{
        const mf=currentFilter==='All'||item.type===currentFilter;
        const q=searchQuery.toLowerCase();
        const ms=!q||item.title.toLowerCase().includes(q)||item.description.toLowerCase().includes(q)||(item.creator||'').toLowerCase().includes(q);
        return mf&&ms;
      });
      grid.innerHTML='';
      if(!filtered.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px;font-family:Space Mono,monospace;font-size:12px;font-weight:700;text-transform:uppercase;color:#837375;">No memories found</div>';return;}
      for(const item of filtered){
        const isPoem=item.type==='Poem'||item.type==='Story';
        const isMedia=['Art', 'Picture', 'Video'].includes(item.type);
        const url=isPoem?`poem.html?id=${item.id}`:`art.html?id=${item.id}`;
        const likeCount=await fetchLikes(item.id);
        const ov=isOwner?`<div class="owner-overlay"><button class="ov-btn edit" onclick="event.stopPropagation();openEdit('${item.id}')">Edit</button><button class="ov-btn delete" onclick="event.stopPropagation();doDelete('${item.id}')">Delete</button></div>`:'';
        const card=document.createElement('article');
        card.className='gallery-card';
        
        let mediaHtml = '';
        if(item.image) {
           const isVideo = item.isVideo || false;
           const actualMedia = isVideo ? `<video src="${item.image}" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;"></video>` : `<img src="${item.image}" alt="${item.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';"/>`;
           
           if(item.keyword) {
             mediaHtml = `
              <div class="pixelated-image-card" onmouseenter="animatePixels(this, true)" onmouseleave="animatePixels(this, false)">
                <div class="pixelated-image-card__default">${actualMedia}</div>
                <div class="pixelated-image-card__active" style="display:none;"><div class="pixelated-image-card__active-text">${item.keyword}</div></div>
                <div class="pixelated-image-card__pixels"></div>
              </div>
             `;
           } else {
             mediaHtml = actualMedia;
           }
        }

        card.innerHTML=`${ov}
          <div class="card-img-wrap">
            ${mediaHtml}
            <button class="like-btn" style="position:absolute;bottom:10px;right:10px;z-index:10;" onclick="event.stopPropagation();doLike(this,'${item.id}')">
              <span class="material-symbols-outlined" style="font-size:13px;font-variation-settings:'FILL' 1;${localStorage.getItem('liked_'+item.id) ? 'color:#c44569;' : ''}">favorite</span>
              <span class="like-count">${likeCount}</span>
            </button>
          </div>
          <div style="padding:16px;background:#fff0f5;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
              <h3 style="font-family:'Silkscreen',cursive;font-size:14px;color:#6b1d4a;flex:1;margin-right:8px;">${item.title}</h3>
              <span class="pixel-badge${isPoem?' pixel-badge-poem':''}">${item.type}</span>
            </div>
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#514345;font-style:italic;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">"${item.description}"</p>
            <div style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#837375;">@${item.creator||'anonymous'}</div>
          </div>`;
        card.addEventListener('click',()=>window.location.href=url);
        grid.appendChild(card);
      }
    }
    
    // Pixel Transition Animation Logic
    function animatePixels(container, activate) {
      if(!window.gsap) return;
      const pixelGrid = container.querySelector('.pixelated-image-card__pixels');
      const activeEl = container.querySelector('.pixelated-image-card__active');
      const defaultEl = container.querySelector('.pixelated-image-card__default');
      
      if(!pixelGrid || !activeEl) return;
      
      const gridSize = 10;
      const animationStepDuration = 0.3;
      
      // Initialize pixels if empty
      if(pixelGrid.children.length === 0) {
        for(let r=0; r<gridSize; r++) {
          for(let c=0; c<gridSize; c++) {
            const px = document.createElement('div');
            px.className = 'pixelated-image-card__pixel';
            const size = 100/gridSize;
            px.style.width = size + '%';
            px.style.height = size + '%';
            px.style.left = (c * size) + '%';
            px.style.top = (r * size) + '%';
            pixelGrid.appendChild(px);
          }
        }
      }
      
      const pixels = pixelGrid.querySelectorAll('.pixelated-image-card__pixel');
      gsap.killTweensOf(pixels);
      
      if(container._delayedCall) container._delayedCall.kill();
      
      gsap.set(pixels, { display: 'none' });
      const staggerDuration = animationStepDuration / pixels.length;
      
      gsap.to(pixels, {
        display: 'block',
        duration: 0,
        stagger: { each: staggerDuration, from: 'random' }
      });
      
      container._delayedCall = gsap.delayedCall(animationStepDuration, () => {
        activeEl.style.display = activate ? 'flex' : 'none';
        defaultEl.style.opacity = activate ? '0' : '1';
      });
      
      gsap.to(pixels, {
        display: 'none',
        duration: 0,
        delay: animationStepDuration,
        stagger: { each: staggerDuration, from: 'random' }
      });
    }

    function doDelete(id){if(!confirm("Delete this item?"))return;deleteItemById(id);renderGallery();}
    let editingId=null;
    function openEdit(id){const item=getAllItems().find(i=>i.id===id);if(!item)return;editingId=id;document.getElementById('editTitle').value=item.title;document.getElementById('editCaption').value=item.description;document.getElementById('editType').value=item.type;document.getElementById('editModal').style.display='flex';}
    function saveEdit(){if(!editingId)return;const t=document.getElementById('editTitle').value.trim();const c=document.getElementById('editCaption').value.trim();const ty=document.getElementById('editType').value;if(!t||!c)return;saveEditById(editingId,{title:t,description:c,type:ty});document.getElementById('editModal').style.display='none';editingId=null;renderGallery();}

    document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderGallery();});
    renderGallery();
  </script>
  <script type="module" src="pixel_trail.js"></script>
  <script type="module" src="music.js"></script>
