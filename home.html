<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friday's Child — Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    * { cursor:url('cursor8.png') 4 4,auto!important; box-sizing:border-box; }
    *::selection { background: #ffb6c1 !important; color: #3d1a2e !important; }
    *::-moz-selection { background: #ffb6c1 !important; color: #3d1a2e !important; }
    a,button,[onclick] { cursor:url('cursor8.png') 4 4,pointer!important; }
    body { background:linear-gradient(135deg,#fff0f5 0%,#ffe4e8 50%,#f0d0e0 100%);min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;padding-bottom:20px; overflow-x:hidden; }
    body::before { content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(to right,rgba(139,26,74,0.06) 1px,transparent 1px),linear-gradient(to bottom,rgba(139,26,74,0.06) 1px,transparent 1px);background-size:24px 24px;z-index:0; }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }

    .top-nav { position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:12px 28px;background:rgba(255,228,232,0.7);backdrop-filter:blur(20px);box-shadow:inset 0 2px 4px rgba(255,255,255,0.75),0 6px 16px rgba(139,26,74,0.1);border-bottom:2px solid #c44569; }
    .site-name { font-family:'Silkscreen',cursive;font-size:20px;color:#6b1d4a;text-decoration:none; }
    .nav-link { font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b1d4a;text-decoration:none;padding:7px 13px;border-radius:8px;transition:all 0.15s; }
    .nav-link:hover,.nav-link.active { background:rgba(196,69,105,0.25);color:#8b1a4a; }
    .user-badge { font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:5px 14px;border-radius:20px;background:#fff0f5;box-shadow:3px 3px 8px rgba(196,69,105,0.15),-3px -3px 8px rgba(255,255,255,0.9);color:#8b1a4a; }
    .owner-badge { background:linear-gradient(135deg,#ffe8a0,#ffd060);box-shadow:3px 3px 8px rgba(180,140,0,0.2);color:#5a3e00; }

    .tama-frame { background:linear-gradient(145deg,#f0b8d0,#e090b8);box-shadow:16px 16px 32px rgba(139,26,74,0.2),-12px -12px 28px rgba(255,255,255,0.9),inset 2px 2px 8px rgba(255,255,255,0.4);border:3px dashed rgba(196,69,105,0.45);border-radius:48px;padding:24px;position:relative; width:min(320px,92vw); margin:0 auto; transition: width 0.4s ease, border-radius 0.4s ease; }
    .tama-frame.wide-mode { width: min(850px, 95vw) !important; border-radius: 32px; padding: 20px; }
    .tama-frame.story-mode { width: min(420px, 95vw) !important; }
    
    .tama-screen { background:linear-gradient(135deg,#aee8e4,#99dcd7);border-radius:18px;box-shadow:inset 6px 6px 16px rgba(0,0,0,0.22),inset -3px -3px 8px rgba(255,255,255,0.12);position:relative;overflow:hidden;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px; transition: aspect-ratio 0.4s ease; }
    .tama-screen.wide-mode { aspect-ratio: 16 / 9; padding: 0; background: #080506; }
    
    .tama-screen::before { content:'';position:absolute;inset:0;background:repeating-linear-gradient(transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);pointer-events:none;z-index:2; transition: opacity 0.4s; }
    .tama-screen.wide-mode::before { opacity: 0.15; }
    
    .screen-text { font-family:'Space Mono',monospace;font-size:14px;color:#1a2e25;line-height:1.6;text-align:center;white-space:pre-wrap;z-index:3;font-weight:700; width:100%; word-wrap:break-word; height:100%;}
    .screen-text::-webkit-scrollbar { display:none; }
    .screen-text { -ms-overflow-style: none; scrollbar-width: none; }
    .screen-icon { font-size:46px;z-index:3;transition:transform 0.2s; }
    
    .screen-media { display: none; width: 100%; height: 100%; object-fit: contain; z-index: 2; position: absolute; top:0; left:0; }
    .tama-screen.wide-mode .screen-media { display: block; }
    .tama-screen.wide-mode .screen-text, .tama-screen.wide-mode .screen-icon { display: none !important; }

    .dpad { position:relative;width:80px;height:80px; filter:drop-shadow(3px 3px 0px #4a0e2e); display:block; }
    .dpad-btn { position:absolute;background:#fff0f5;border:2px solid #6b1d4a;transition:none;display:flex;align-items:center;justify-content:center;color:#6b1d4a;font-size:10px; }
    .dpad-btn:active { background:#e090b8; }
    .dpad-up { top:0;left:27px;width:26px;height:30px;border-bottom:none;padding-top:2px; }
    .dpad-down { bottom:0;left:27px;width:26px;height:30px;border-top:none;padding-bottom:2px; }
    .dpad-left { left:0;top:27px;width:30px;height:26px;border-right:none;padding-left:2px; }
    .dpad-right { right:0;top:27px;width:30px;height:26px;border-left:none;padding-right:2px; }
    .dpad-center { position:absolute;top:27px;left:27px;width:26px;height:26px;background:#fff0f5;z-index:2;border:none;pointer-events:none; }
    
    .action-btn { width:44px;height:44px;border-radius:0;border:2px solid #3d0a28;font-family:'Silkscreen',cursive;font-size:18px;color:white;transition:none; }
    .action-btn.a { background:#8b1a4a;box-shadow:3px 3px 0 0 #3d0a28; }
    .action-btn.b { background:#6b1d4a;box-shadow:3px 3px 0 0 #3d0a28;transform:translateY(-14px); }
    .action-btn:active { transform:translate(2px,2px);box-shadow:0 0 0 0 #3d0a28!important; }
    .action-btn.b:active { transform:translate(2px,-12px);box-shadow:0 0 0 0 #3d0a28!important; }
    
    #btnSta:active, #btnSel:active { transform:translate(2px,2px);box-shadow:0 0 0 0 #3d0a28!important; }

    .action-button { background:linear-gradient(135deg,#8b1a4a,#c44569);color:white;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;border:2px solid #6b1d4a;border-radius:9999px;box-shadow:0 4px 0 0 #4a0e2e;transition:all 0.08s;padding:12px 24px;display:inline-flex;align-items:center;justify-content:center;gap:8px; }
    .action-button:active { transform:translateY(4px);box-shadow:0 0 0 0 #4a0e2e; }

    .owner-strip { font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;background:linear-gradient(135deg,#fff8e0,#ffe8a0);border:2px solid #d4a017;box-shadow:4px 4px 0 #d4a017;border-radius:0;padding:10px 18px;color:#5a3e00;text-align:center; margin-top:20px; }

    .comment-card { background:white;border:2px solid rgba(139,26,74,0.1);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 4px 12px rgba(139,26,74,0.04);position:relative; }
    .clay-input { background:#fff0f5;border:2px solid rgba(139,26,74,0.2);border-radius:12px;padding:12px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#1b1c1a;width:100%;outline:none;box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);transition:border-color 0.2s;margin-bottom:12px;resize:vertical; }
    .clay-input:focus { border-color:#8b1a4a; }

    .sticker { position:fixed;pointer-events:none;image-rendering:pixelated;z-index:0;filter:drop-shadow(2px 4px 5px rgba(107,29,74,0.18)); }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-13px) rotate(5deg);} }
    @keyframes float-r { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-11px) rotate(-5deg);} }
    #burstCanvas { position:fixed;inset:0;pointer-events:none;z-index:999; }
  </style>
</head>
<body>
  <canvas id="burstCanvas"></canvas>
  <img src="1.png" class="sticker" style="width:75px;top:10%;left:1%;animation:float 4.5s ease-in-out infinite;"/>
  <img src="2.png" class="sticker" style="width:50px;top:45%;left:3%;animation:float-r 5.2s ease-in-out infinite 0.3s;"/>
  <img src="3.png" class="sticker" style="width:85px;top:80%;left:2%;animation:float 6.1s ease-in-out infinite 1.1s;"/>
  <img src="4.png" class="sticker" style="width:68px;bottom:16%;right:3%;animation:float-r 4.5s ease-in-out infinite 0.4s;"/>
  <img src="5.png" class="sticker" style="width:62px;top:28%;right:2%;animation:float-r 5.5s ease-in-out infinite 0.8s;"/>
  <img src="6.png" class="sticker" style="width:52px;bottom:20%;left:1.5%;animation:float 6s ease-in-out infinite 1.4s;"/>
  <img src="7.png" class="sticker" style="width:40px;top:15%;right:6%;animation:float 4s ease-in-out infinite 0.2s;"/>
  <img src="9.png" class="sticker" style="width:70px;top:60%;right:1%;animation:float-r 5.8s ease-in-out infinite 0.7s;"/>

  <img src="12.png" class="sticker" style="width:60px;bottom:2%;right:15%;animation:float 5.3s ease-in-out infinite 0.5s;"/>
  <img src="13.png" class="sticker" style="width:48px;top:8%;right:22%;animation:float-r 4.7s ease-in-out infinite 1.5s;"/>

  <div class="sticker" style="top:35%;left:5%;animation:float 7s ease-in-out infinite 0.2s;font-family:'Silkscreen',cursive;color:#c44569;font-size:20px;opacity:0.4;transform:rotate(-15deg);font-weight:bold;">#MUNCHID4LIFE</div>
  <div class="sticker" style="top:70%;right:8%;animation:float-r 6.5s ease-in-out infinite 1.1s;font-family:'Silkscreen',cursive;color:#c44569;font-size:18px;opacity:0.4;transform:rotate(10deg);font-weight:bold;">#TXT</div>
  <img src="alien.png" class="sticker" style="width:65px;top:50%;left:15%;animation:float 5.5s ease-in-out infinite 0.4s;"/>

  <div class="sticker" style="top:40%;right:25%;animation:float 7.5s ease-in-out infinite 0.9s;font-family:'Silkscreen',cursive;color:#c44569;font-size:22px;opacity:0.3;transform:rotate(-8deg);font-weight:bold;">#NEWJEANS</div>

  <div class="sticker" style="top:15%;right:12%;animation:float 8s ease-in-out infinite 0.7s;font-family:'Silkscreen',cursive;color:#c44569;font-size:16px;opacity:0.3;transform:rotate(15deg);font-weight:bold;">#MUNCHID4LIFE</div>


  <div style="position:fixed;top:-10%;left:-10%;width:50vw;height:50vw;border-radius:50%;background:#d4447a;filter:blur(120px);opacity:0.25;z-index:0;pointer-events:none;"></div>
  <div style="position:fixed;bottom:-10%;right:-10%;width:60vw;height:60vw;border-radius:50%;background:#ffd9dd;filter:blur(120px);opacity:0.25;z-index:0;pointer-events:none;"></div>

  <header class="top-nav" id="topNav"></header>

  <!-- Title section stays centered -->
  <div id="dashboardHeader" style="text-align:center;margin-top:32px;margin-bottom:16px;position:relative;z-index:1;transition:all 0.4s ease;">
    <h1 style="font-family:'Silkscreen',cursive;font-size:clamp(40px,8vw,64px);color:#6b1d4a;margin-top:10px;">Dashboard</h1>
    <p style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#8b1a4a;margin-top:6px;">Your art sanctuary</p>
  </div>

  <main id="mainContainer" class="main-content" style="max-width:1400px;margin:0 auto;padding:16px 20px;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:40px;min-height:700px;transition:transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);">
    
    <div id="topRow" style="display:flex; flex-direction:column; gap:40px; width:100%; align-items:center; transition: gap 0.6s, justify-content 0.6s;">
    <!-- Left: Nokia Reader -->
    <div id="readerContainer" style="transition:all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); flex-shrink:0;">
      <div class="tama-frame">
        <div class="tama-screen" style="margin-bottom:18px;">
          <div class="screen-icon" id="screenIcon" style="font-size:40px;"></div>
          <div class="screen-text" id="screenText"></div>
          <img id="screenMedia" class="screen-media" />
        </div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;width:100%;padding:0 4px;">
          <div class="dpad">
            <button class="dpad-btn dpad-up" id="btnUp">▲</button>
            <button class="dpad-btn dpad-down" id="btnDown">▼</button>
            <button class="dpad-btn dpad-left" id="btnLeft">◀</button>

          </div>
          <div style="display:flex;gap:8px;align-items:center;padding-bottom:10px;">

          </div>
          <div style="display:flex;gap:14px;align-items:flex-end;padding-bottom:8px;">
            <button class="action-btn a" id="btnA">A</button>
            <button class="action-btn b" id="btnB">B</button>
          </div>
        </div>
      </div>
      <div id="ownerStrip" class="owner-strip" style="display:none;width:100%;">Ms. Aditi Mode — Create, Edit &amp; Delete freely</div>
    </div>

    <!-- Right: Details Panel -->
    <div id="detailsPanel" style="flex:1; width:100%; min-width:300px; max-width:600px; display:none; opacity:0; transition:opacity 0.6s ease; flex-direction:column; padding-top:10px;">
      
      <div style="margin-bottom:32px;">
        <div id="detailBannerContainer" style="display:none;margin-bottom:20px;border-radius:16px;overflow:hidden;border:2px dashed #c44569;box-shadow:inset 0 2px 8px rgba(0,0,0,0.1);">
          <img id="detailBannerImg" style="width:100%;max-height:220px;object-fit:cover;display:block;" />
        </div>
        <h2 id="detailTitle" style="font-family:'Silkscreen',cursive;font-size:clamp(32px, 5vw, 64px);color:#4a0e2e;margin-bottom:12px;line-height:1.1;text-shadow: 2px 2px 0 rgba(255,255,255,0.5);">Title</h2>
        <div id="detailCreator" style="font-family:'Space Mono',monospace;font-size:16px;color:#8b1a4a;text-transform:uppercase;font-weight:700;margin-bottom:24px;">@creator</div>
        
        <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:800;color:#c44569;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Significance to her</p>
        <div style="position:relative;">
          <p id="detailDesc" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;color:#5c163d;line-height:1.7;font-style:italic; display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; overflow:hidden; transition:all 0.3s;">Description goes here...</p>
          <textarea id="editDescInput" style="display:none;width:100%;min-height:120px;background:rgba(255,255,255,0.5);border:2px solid #e090b8;border-radius:12px;padding:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:#5c163d;line-height:1.6;resize:vertical;outline:none;"></textarea>
          <div id="descDisplayControls" style="display:flex;gap:12px;margin-top:8px;">

            <button id="editDescBtn" onclick="editDesc()" style="display:none;background:none;border:none;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#d4a017;text-decoration:underline;cursor:pointer;padding:0;"><span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">edit</span> Edit</button>

            <button onclick="saveDesc()" style="background:#8b1a4a;border:none;color:white;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:6px 12px;border-radius:6px;cursor:pointer;box-shadow:2px 2px 0 0 #3d0a28;">Save</button>
            <button onclick="cancelDesc()" style="background:transparent;border:2px solid #8b1a4a;color:#8b1a4a;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;">Cancel</button>
          </div>
        </div>
      </div>
      
      <div style="display:flex;gap:16px;align-items:center;margin-bottom:32px;">

    <div id="commentsSection" style="display:none; opacity:0; transition:opacity 0.6s ease; width:100%; flex-basis:100%; max-width:900px; margin:0 auto; background:rgba(255,240,245,0.7);backdrop-filter:blur(16px);border:3px dashed rgba(196,69,105,0.4);border-radius:32px;padding:32px;box-shadow:0 12px 32px rgba(139,26,74,0.08);">

      </div>

  </main>

  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.body.innerHTML += `<div style="position:fixed;top:10px;left:10px;background:white;color:red;padding:20px;z-index:9999;border:2px solid red;">ERROR: ${msg} <br/> Line: ${lineNo}</div>`;
      return false;
    };

    // ── Pixel Burst ─────────────────────────────────────
    const canvas=document.getElementById('burstCanvas'),ctx=canvas.getContext('2d');
    function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
    resize();window.addEventListener('resize',resize);
    const C=['#c44569','#8b1a4a','#d4447a','#ffc0cb','#ffb2bd','#6b1d4a','#ffffff'];
    let ps=[];
    class Px{constructor(x,y){const a=Math.random()*Math.PI*2,s=Math.random()*5+1.5;this.x=x;this.y=y;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-Math.random()*2;this.sz=Math.random()*6+2;this.c=C[Math.floor(Math.random()*C.length)];this.l=1;this.d=Math.random()*0.02+0.012;this.g=0.11;}update(){this.vy+=this.g;this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.l-=this.d;}draw(){ctx.save();ctx.globalAlpha=Math.max(0,this.l);ctx.fillStyle=this.c;ctx.fillRect(Math.round(this.x),Math.round(this.y),this.sz,this.sz);ctx.restore();}}
    function burst(x,y,n=30){for(let i=0;i<n;i++)ps.push(new Px(x,y));}
    function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);ps=ps.filter(p=>p.l>0);ps.forEach(p=>{p.update();p.draw();});requestAnimationFrame(loop);}
    loop();
    function ambient(){burst(Math.random()*canvas.width,Math.random()*canvas.height*0.75,14);setTimeout(ambient,Math.random()*6000+5000);}
    ambient();

    // ── Auth & Nav ──────────────────────────────────────
    const username=localStorage.getItem('fc_username')||'Guest';
    const role=localStorage.getItem('fc_role')||'guest';
    const isOwner=role==='owner';

    function buildNav(activePage){
      const badge=isOwner?`<span class="user-badge owner-badge">${username}</span>`:`<span class="user-badge">@${username}</span>`;
      let links=`<a href="home.html" class="nav-link${activePage==='dashboard'?' active':''}">Dashboard</a>`;
      links+=`<a href="gallery.html" class="nav-link${activePage==='gallery'?' active':''}">Gallery</a>`;
      if(isOwner) links+=`<a href="creation.html" class="nav-link${activePage==='studio'?' active':''}">Studio</a>`;
      links+=`<a href="about.html" class="nav-link${activePage==='about'?' active':''}">About</a>`;
      document.getElementById('topNav').innerHTML=`<a href="home.html" class="site-name">Friday's Child</a><nav style="display:flex;gap:4px;align-items:center;">${links}</nav><div style="display:flex;align-items:center;gap:12px;">${badge}</div>`;
    }
    buildNav('dashboard');
    if(isOwner) document.getElementById('ownerStrip').style.display='block';

    // ── Data & Reader State ─────────────────────────────
    const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    function tone(f,t='sine',d=0.15,v=0.06){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}

    const DEFAULT_ITEMS=[
      {id:'poem1',title:"Monday's Child",type:'Poem',image:'',description:`Monday's child is fair of face,
Tuesday's child is full of grace,
Wednesday's child is full of woe,
Thursday's child has far to go,
Friday's child is loving and giving,
Saturday's child works hard for a living,
But the child who is born on the Sabbath day
Is bonny and blithe and good and gay.`,creator:'Mother Goose',likes:0}
    ];

    async function getAllItems(){
      const customLocal=JSON.parse(localStorage.getItem('fc_custom_items')||'[]');
      let customDb = [];
      try {
        const res = await fetch('/api/items');
        if (res.ok) customDb = await res.json();
      } catch(e) { console.error('Failed to fetch DB items', e); }
      
      const deleted=JSON.parse(localStorage.getItem('fc_deleted_ids')||'[]');
      const edited=JSON.parse(localStorage.getItem('fc_edited_items')||'{}');
      
      // Combine local and DB items (DB items take precedence if IDs match)
      const dbIds = customDb.map(i => i.id);
      const filteredLocal = customLocal.filter(i => !dbIds.includes(i.id));
      
      return [...DEFAULT_ITEMS,...filteredLocal,...customDb].filter(i=>!deleted.includes(i.id)).map(i=>edited[i.id]?{...i,...edited[i.id]}:i).map(i=>{
        if(!i.content) i.content = i.description;
        return i;
      });
    }

    let allItems=[], items=[], state='folders', folderIndex=0, listIndex=0, readLines=[], readPage=0;
    const folders = ['Poems', 'Stories', 'Essays', 'Videos', 'Art', 'Pictures'];
    const folderToType = {'Poems':'Poem', 'Stories':'Story', 'Essays':'Essay', 'Videos':'Video', 'Art':'Art', 'Pictures':'Picture'};
    const linesPerPage=7;

    function setViewState(newState) {
      state = newState;
      const main = document.getElementById('mainContainer');
      const header = document.getElementById('dashboardHeader');
      const reader = document.getElementById('readerContainer');
      const panel = document.getElementById('detailsPanel');
      const strip = document.getElementById('ownerStrip');
      
      if(state === 'read') {
        if(isOwner) strip.style.display = 'none';

        // Enlarge phone and shift left smoothly
        header.style.opacity = '0';
        header.style.pointerEvents = 'none';

        // Move main container up to cover header gap
        main.style.transform = 'translateY(-80px)';
        const tr = document.getElementById('topRow');
        tr.style.gap = window.innerWidth > 768 ? '60px' : '40px';
        tr.style.flexDirection = window.innerWidth > 768 ? 'row' : 'column';
        tr.style.alignItems = window.innerWidth > 768 ? 'flex-start' : 'center';
        
        // Handle wide-mode for media (Art/Edit)
        const item = items[listIndex];
        const isMedia = ['Art', 'Picture', 'Video'].includes(item.type);
        const isStory = ['Story', 'Essay'].includes(item.type);
        const frameEl = document.querySelector('.tama-frame');
        const screenEl = document.querySelector('.tama-screen');
        const sm = document.getElementById('screenMedia');
        
        if(isStory) {
          frameEl.classList.add('story-mode');
        } else {
          frameEl.classList.remove('story-mode');
        }

        if(isMedia) {
           frameEl.classList.add('wide-mode');
           screenEl.classList.add('wide-mode');
           
           let newHtml = '';
           if(item.type === 'Video' || item.isVideo) {
             newHtml = `<video id="screenMedia" class="screen-media" src="${item.image}" autoplay loop muted playsinline controls></video>`;
           } else {
             newHtml = `<img id="screenMedia" class="screen-media" src="${item.image}" />`;
           }
           sm.outerHTML = newHtml;
           
           const newSm = document.getElementById('screenMedia');
           newSm.addEventListener(newSm.tagName==='VIDEO'?'loadedmetadata':'load', function() {
              const w = this.tagName==='VIDEO' ? this.videoWidth : this.naturalWidth;
              const h = this.tagName==='VIDEO' ? this.videoHeight : this.naturalHeight;
              if (h > w * 1.1) {
                  // Portrait
                  frameEl.style.width = 'min(420px, 92vw)';
                  screenEl.style.aspectRatio = (w/h).toString();
              } else {
                  // Landscape
                  frameEl.style.width = 'min(500px, 45vw)';
                  screenEl.style.aspectRatio = '16 / 9';
              }
              // Retrigger scale calculation
              if(window.innerWidth > 768) {
                const screenHeight = window.innerHeight;
                const readerHeight = reader.offsetHeight || 600;
                let scaleTarget = (screenHeight * 0.78) / readerHeight;
                if(scaleTarget > 1.15) scaleTarget = 1.15; 
                reader.style.transform = `scale(${scaleTarget})`;
                reader.style.marginRight = `${reader.offsetWidth * (scaleTarget - 1) + 80}px`;
                reader.style.marginBottom = `${reader.offsetHeight * (scaleTarget - 1) + 40}px`;
              }
           });
           
        } else {
           frameEl.classList.remove('wide-mode');
           screenEl.classList.remove('wide-mode');
           if (!isStory) {
             frameEl.style.width = '';
           }
           screenEl.style.aspectRatio = '';
           if (sm && sm.tagName === 'VIDEO') {
             sm.outerHTML = `<img id="screenMedia" class="screen-media" />`;
           }
        }
        
        // Force reflow so scaling calculations use the new dimensions
        reader.offsetHeight;

        // Scale reader to fill vertical space nicely but leave a margin at the bottom
        let scaleTarget = 1;
        let rightMargin = '0';
        let bottomMargin = '0';
        if(window.innerWidth > 768) {
           const screenHeight = window.innerHeight;
           const readerHeight = reader.offsetHeight || 600;
           // fill 78% of screen height so it doesn't touch the bottom
           scaleTarget = (screenHeight * 0.78) / readerHeight;
           
           if(isMedia) {
             if(scaleTarget > 1.15) scaleTarget = 1.15; 
           } else {
             if(scaleTarget < 1.1) scaleTarget = 1.1;
             if(scaleTarget > 1.35) scaleTarget = 1.35; 
           }
           
           // Extra margin so it doesn't overlap details panel when scaled
           rightMargin = `${reader.offsetWidth * (scaleTarget - 1) + 80}px`;
           bottomMargin = `${reader.offsetHeight * (scaleTarget - 1) + 40}px`;
        }

        reader.style.transform = `scale(${scaleTarget})`;
        reader.style.transformOrigin = window.innerWidth > 768 ? 'top left' : 'center';
        reader.style.marginRight = rightMargin;
        reader.style.marginBottom = bottomMargin;
        
        // Ensure flex layout works
        if(window.innerWidth > 768) {
           tr.style.justifyContent = 'flex-start';
           tr.style.paddingLeft = '1vw';
        } 
        
        panel.style.display = 'flex';
        const commentsSec = document.getElementById('commentsSection');
        commentsSec.style.display = 'block';
        setTimeout(() => {
          panel.style.opacity = '1';
          commentsSec.style.opacity = '1';
        }, 150); // slight delay for smooth flow
        
        // Load details panel data
        document.getElementById('detailTitle').textContent = item.title;
        document.getElementById('detailCreator').textContent = '@' + (item.creator||'anonymous');
        
        const isPoemType = item.type === 'Poem' || item.type === 'Story';
        if(isPoemType && item.image) {
           document.getElementById('detailBannerContainer').style.display = 'block';
           document.getElementById('detailBannerImg').src = item.image;
        } else {
           document.getElementById('detailBannerContainer').style.display = 'none';
           document.getElementById('detailBannerImg').removeAttribute('src');
        }
        
        const descEl = document.getElementById('detailDesc');
        descEl.textContent = item.description;
        
        // Reset desc state
        descExpanded = false;
        descEl.style.display = '-webkit-box';
        document.getElementById('editDescInput').style.display = 'none';
        document.getElementById('descDisplayControls').style.display = 'flex';
        document.getElementById('descEditControls').style.display = 'none';
        
        descEl.style.webkitLineClamp = '5';
        const seeMoreBtn = document.getElementById('seeMoreBtn');
        seeMoreBtn.textContent = 'See more';
        
        // Check if description is long enough to need See More
        setTimeout(() => {
          if(descEl.scrollHeight > descEl.clientHeight) {
            seeMoreBtn.style.display = 'block';
          } else {
            seeMoreBtn.style.display = 'none';
          }
        }, 10); // Small delay to allow render

        if(isOwner) {
          document.getElementById('editDescBtn').style.display = 'block';
        } else {
          document.getElementById('editDescBtn').style.display = 'none';
        }
        
        fetchLikes(item.id);
        loadComments(item.id);
      } else {
        if(isOwner) strip.style.display = 'block';

        header.style.opacity = '1';
        header.style.pointerEvents = 'auto';

        // Reset layout changes
        main.style.transform = 'translateY(0)';
        const tr = document.getElementById('topRow');
        tr.style.flexDirection = 'column';
        tr.style.gap = '40px';
        tr.style.justifyContent = 'center';
        tr.style.paddingLeft = '0';
        tr.style.alignItems = 'center';
        
        panel.style.opacity = '0';
        const commentsSec = document.getElementById('commentsSection');
        commentsSec.style.opacity = '0';
        
        reader.style.transform = 'scale(1)';
        reader.style.marginRight = '0';
        reader.style.marginBottom = '0';
        
        setTimeout(() => {
          panel.style.display = 'none';
          commentsSec.style.display = 'none';
        }, 400);
        
        // Remove modes on return to menu
        document.querySelector('.tama-frame').classList.remove('wide-mode');
        document.querySelector('.tama-frame').classList.remove('story-mode');
        document.querySelector('.tama-screen').classList.remove('wide-mode');
        document.querySelector('.tama-frame').style.width = '';
        document.querySelector('.tama-screen').style.aspectRatio = '';
        const sm = document.getElementById('screenMedia');
        if (sm && sm.tagName === 'VIDEO') {
          sm.pause();
          sm.removeAttribute('src');
          sm.load();
        }
        
        setTimeout(() => panel.style.display = 'none', 400);
      }
      renderScreen();
    }

    function renderScreen(){
      const iconEl=document.getElementById('screenIcon'),textEl=document.getElementById('screenText');
      
      if(state==='folders'){
        iconEl.innerHTML='';
        textEl.style.overflowY = 'hidden';
        let display='--- MAIN MENU ---\n\n';
        folders.forEach((f,idx)=>{
          display+=(idx===folderIndex?'> ':'  ')+'['+f+']\n';
        });
        textEl.style.textAlign='left';textEl.textContent=display;
      } else if(state==='list') {
        iconEl.innerHTML='';
        textEl.style.overflowY = 'hidden';
        if(!items.length){
          textEl.textContent=`--- ${folders[folderIndex].toUpperCase()} ---\n\n  (Empty)`;
          return;
        }
        let start=Math.max(0,listIndex-2);
        if(start+5>items.length)start=Math.max(0,items.length-5);
        let visible=items.slice(start,start+5);
        let display=`--- ${folders[folderIndex].toUpperCase()} ---\n\n`;
        visible.forEach((it,idx)=>{
          let ri=start+idx;
          display+=(ri===listIndex?'> ':'  ')+it.title+'\n';
        });
        textEl.style.fontSize = ''; // Revert to CSS default (14px)
        textEl.style.textAlign='left';textEl.textContent=display;
        textEl.style.overflowY = 'hidden';
        textEl.scrollTop = 0;
      } else {
        iconEl.innerHTML='';
        const it = items[listIndex];
        textEl.style.overflowY = 'hidden';
        textEl.style.fontSize = '14px'; // Slightly larger for reading
        textEl.style.whiteSpace = 'pre-wrap';
        textEl.style.textAlign = 'left';
        
        let start=readPage*linesPerPage;
        let visible=readLines.slice(start,start+linesPerPage);
        let pg=Math.floor((readLines.length-1)/linesPerPage)||0;
        let display=`[ ${it.title.toUpperCase()} ] ${readPage+1}/${pg+1}\n\n`;
        display+=visible.join('\n');
        
        textEl.textContent = display;
        textEl.scrollTop = 0;
      }
    }
    
    function chunkText(text){
      if(!text) return [];
      const lines = text.split('\n');
      const result = [];
      lines.forEach(line => {
        const words = line.split(' ');
        let cur = "";
        words.forEach(w => {
          if ((cur + w).length > 22) {
            result.push(cur.trim());
            cur = w + " ";
          } else {
            cur += w + " ";
          }
        });
        if (cur) result.push(cur.trim());
        else result.push(""); 
      });
      return result;
    }
    
    async function initReader(){
      allItems=await getAllItems();
      state='folders';
      folderIndex=0;
      setViewState('folders');
    }

    // Button Controls
    document.getElementById('btnUp').addEventListener('click',()=>{
      if(state==='folders'){tone(659,'sine',0.08);folderIndex=(folderIndex-1+folders.length)%folders.length;renderScreen();}
      else if(state==='list'&&items.length>0){tone(659,'sine',0.08);listIndex=(listIndex-1+items.length)%items.length;renderScreen();}
      else if(state==='read'){document.getElementById('screenText').scrollTop-=40;}
    });
    document.getElementById('btnDown').addEventListener('click',()=>{
      if(state==='folders'){tone(392,'sine',0.08);folderIndex=(folderIndex+1)%folders.length;renderScreen();}
      else if(state==='list'&&items.length>0){tone(392,'sine',0.08);listIndex=(listIndex+1)%items.length;renderScreen();}
      else if(state==='read'){document.getElementById('screenText').scrollTop+=40;}
    });
    document.getElementById('btnLeft').addEventListener('click',()=>{
      if(state==='read'&&readPage>0){tone(494,'sine',0.1);readPage--;renderScreen();}
    });
    document.getElementById('btnRight').addEventListener('click',()=>{
      if(state==='read'&&(readPage+1)*linesPerPage<readLines.length){tone(587,'sine',0.1);readPage++;renderScreen();}
    });
    
    // Keyboard Support
    document.addEventListener('keydown', (e) => {
      // Don't trigger if typing in the comment box or editing description
      if(document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
      
      if(e.key === 'ArrowUp') document.getElementById('btnUp').click();
      if(e.key === 'ArrowDown') document.getElementById('btnDown').click();
      if(e.key === 'ArrowLeft') document.getElementById('btnLeft').click();
      if(e.key === 'ArrowRight') document.getElementById('btnRight').click();
      if(e.key === 'Enter') document.getElementById('btnA').click();
      if(e.key === 'Escape') document.getElementById('btnB').click();
    });

    document.getElementById('btnA').addEventListener('click',()=>{
      tone(523,'triangle',0.1);
      if(state==='folders'){
         const type = folderToType[folders[folderIndex]];
         items = allItems.filter(i => i.type === type);
         listIndex = 0;
         setViewState('list');
      } else if(state==='list'&&items.length>0){
        const it = items[listIndex];
        readLines = chunkText(it.content || it.description);
        readPage=0;
        setViewState('read');
      } else if(state==='read'){
        if((readPage+1)*linesPerPage<readLines.length)readPage++;
      }
    });
    
    document.getElementById('btnB').addEventListener('click',()=>{
      tone(783,'triangle',0.15);
      if(state==='read') setViewState('list');
      else if(state==='list') setViewState('folders');
    });
    
    document.getElementById('btnSta').addEventListener('click',()=>{
      tone(880,'square',0.2);
      if(allItems.length>0){
        const rnd = allItems[Math.floor(Math.random()*allItems.length)];
        const folderName = Object.keys(folderToType).find(k => folderToType[k] === rnd.type) || 'Poems';
        folderIndex = folders.indexOf(folderName);
        items = allItems.filter(i => i.type === rnd.type);
        listIndex = items.findIndex(i => i.id === rnd.id);
        
        if(rnd.type === 'Story') readLines = [rnd.content];
        else readLines = chunkText(rnd.content);
        
        readPage = 0;
        setViewState('read');
      }
    });

    initReader();

    // ── API Integration (Right Panel) ───────────────────
    async function fetchLikes(itemId){
      document.getElementById('likeCountText').textContent='...';
      const btn = document.getElementById('likeBtn');
      let likedItems = JSON.parse(localStorage.getItem('fc_liked_items') || '[]');
      let isLiked = likedItems.includes(itemId);
      
      if(isLiked) {
        btn.style.opacity = '0.6';
        btn.style.cursor = 'default';
      } else {
        btn.style.opacity = '1';
        btn.style.cursor = "pointer";
      }

      try {
        const res=await fetch(`/api/likes/${itemId}`);
        const data=await res.json();
        document.getElementById('likeCountText').textContent=`${data.count||0} ${isLiked ? 'Liked' : 'Likes'}`;
      } catch(e) {
        document.getElementById('likeCountText').textContent=`0 ${isLiked ? 'Liked' : 'Likes'}`;
      }
    }
    
    async function doLike(){
      if(state!=='read')return;
      const itemId = items[listIndex].id;
      
      let likedItems = JSON.parse(localStorage.getItem('fc_liked_items') || '[]');
      if(likedItems.includes(itemId)) return; // already liked
      
      const btn=document.getElementById('likeBtn');
      burst(btn.getBoundingClientRect().x+50, btn.getBoundingClientRect().y, 40);
      try {
        const res=await fetch(`/api/likes/${itemId}`,{method:'POST'});
        const data=await res.json();
        
        likedItems.push(itemId);
        localStorage.setItem('fc_liked_items', JSON.stringify(likedItems));
        
        btn.style.opacity = '0.6';
        btn.style.cursor = 'default';
        document.getElementById('likeCountText').textContent=`${data.count||0} Liked`;
      } catch(e) {
        let cnt=parseInt(document.getElementById('likeCountText').textContent)||0;
        
        likedItems.push(itemId);
        localStorage.setItem('fc_liked_items', JSON.stringify(likedItems));
        
        btn.style.opacity = '0.6';
        btn.style.cursor = 'default';
        document.getElementById('likeCountText').textContent=`${cnt+1} Liked`;
      }
    }

    async function loadComments(itemId){
      const list=document.getElementById('commentsList');
      list.innerHTML='<div style="text-align:center;color:#837375;font-size:11px;">Loading notes...</div>';
      try {
        const res=await fetch(`/api/comments/${itemId}`);
        const comments=await res.json();
        if(!comments||!comments.length){
          list.innerHTML=`<div style="text-align:center;color:#837375;font-family:Space Mono,monospace;font-size:11px;">No notes yet (*.*)</div>`;
          return;
        }
        list.innerHTML=comments.map(c=>`
          <div class="comment-card" style="position:relative;">
            <div style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;color:#8b1a4a;margin-bottom:6px;">@${c.author}</div>
            <p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#514345;line-height:1.5;">${c.text}</p>
            ${isOwner ? `<button onclick="deleteComment('${c._id}')" style="position:absolute;top:12px;right:12px;background:none;border:none;color:#ba1a1a;cursor:pointer;"><span class="material-symbols-outlined" style="font-size:16px;">delete</span></button>` : ''}
          </div>
        `).join('');
      } catch(e) {
        list.innerHTML=`<div style="text-align:center;color:#ba1a1a;font-family:Space Mono,monospace;font-size:11px;">(Database connection failed)</div>`;
      }
    }

    async function postComment(){
      if(state!=='read')return;
      const itemId = items[listIndex].id;
      const txt=document.getElementById('commentText').value.trim();
      if(!txt)return;
      document.getElementById('commentText').value='';
      try {
        await fetch(`/api/comments/${itemId}`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({author:username, text:txt})
        });
        loadComments(itemId);
        const btn=document.querySelector('.action-button');
        burst(btn.getBoundingClientRect().x, btn.getBoundingClientRect().y, 25);
      } catch(e) {
        alert("Couldn't connect to database!");
      }
    }
    
    async function deleteComment(cid) {
      if(!confirm("Delete this sweet note?")) return;
      try {
        await fetch('/api/comments/' + cid, { method: 'DELETE' });
        loadComments(items[listIndex].id);
      } catch(e) {
        alert("Couldn't delete the note.");
      }
    }

    let descExpanded = false;
    function toggleDesc() {
      const descEl = document.getElementById('detailDesc');
      const btn = document.getElementById('seeMoreBtn');
      descExpanded = !descExpanded;
      if(descExpanded) {
        descEl.style.webkitLineClamp = 'unset';
        btn.textContent = 'See less';
      } else {
        descEl.style.webkitLineClamp = '5';
        btn.textContent = 'See more';
      }
    }

    function editDesc() {
      const item = items[listIndex];
      const descEl = document.getElementById('detailDesc');
      const inputEl = document.getElementById('editDescInput');
      
      descEl.style.display = 'none';
      document.getElementById('descDisplayControls').style.display = 'none';
      
      inputEl.style.display = 'block';
      document.getElementById('descEditControls').style.display = 'flex';
      
      inputEl.value = item.description || '';
      inputEl.focus();
    }

    function cancelDesc() {
      document.getElementById('editDescInput').style.display = 'none';
      document.getElementById('descEditControls').style.display = 'none';
      document.getElementById('detailDesc').style.display = '-webkit-box';
      document.getElementById('descDisplayControls').style.display = 'flex';
    }

    function saveDesc() {
      const item = items[listIndex];
      const newDesc = document.getElementById('editDescInput').value.trim();
      
      let edited = JSON.parse(localStorage.getItem('fc_edited_items')||'{}');
      if(!edited[item.id]) edited[item.id] = {};
      edited[item.id].description = newDesc;
      localStorage.setItem('fc_edited_items', JSON.stringify(edited));
      
      // Update current item and DOM
      item.description = newDesc;
      document.getElementById('detailDesc').textContent = newDesc;
      
      // Switch UI back
      cancelDesc();
      
      // Re-check overflow
      descExpanded = false;
      document.getElementById('detailDesc').style.webkitLineClamp = '5';
      const seeMoreBtn = document.getElementById('seeMoreBtn');
      seeMoreBtn.textContent = 'See more';
      setTimeout(() => {
        if(document.getElementById('detailDesc').scrollHeight > document.getElementById('detailDesc').clientHeight) {
          seeMoreBtn.style.display = 'block';
        } else {
          seeMoreBtn.style.display = 'none';
        }
      }, 10);
    }
  </script>
